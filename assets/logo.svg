<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00a884"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#075e54"/>
      <stop offset="100%" style="stop-color:#128c7e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>
  <!-- Phone icon (simplified WhatsApp) -->
  <g transform="translate(256,230) scale(1.1)" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0-80 C44-80 80-44 80 0 C80 44 44 80 0 80 C-28 80 -52 66 -66 48 L-80 80 L-68 48 C-78 32 -80 16 -80 0 C-80-44 -44-80 0-80Z" fill="rgba(255,255,255,0.15)" stroke="#fff"/>
    <path d="M-32-12 C-32-12 -20-28 0-28 C20-28 32-12 32-12" stroke="#fff" fill="none"/>
    <path d="M-36 16 C-36 16 -18 36 0 36 C18 36 36 16 36 16" stroke="#fff" fill="none"/>
  </g>
  <!-- Multi-account indicator: stacked circles -->
  <g transform="translate(356, 380)">
    <circle cx="0" cy="0" r="48" fill="url(#accent)" stroke="#fff" stroke-width="6"/>
    <circle cx="-28" cy="-16" r="48" fill="url(#accent)" stroke="#fff" stroke-width="6" opacity="0.5"/>
    <text x="0" y="8" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="700">W</text>
  </g>
</svg>
